         <style>
            body{

                margin: 1rem auto;

            header{
                background-color: #faf2cc;
                margin: 0 1rem;
                padding: 1rem 0;
                color: #555;
                height: 100px;
            }

            h1{
                text-align: center;
                margin-top: 1em;
            }

            section{
                background-color: #d0e9c6;
                margin: 1rem;
                display: grid;
                padding: 1rem;
                grid-gap: 1rem;
                grid-template-columns: repeat(3, 1fr);
            }

            article{
                padding: 1rem;
                background-color: #ebccd1;
                border: 1px solid #c23131;
            }

            section article:nth-child(4){
                grid-row-start: 2;
                grid-row-end: 4;
            }

            section article:nth-child(5){
                grid-column-start: 2;
                grid-column-end: 4;
            }
